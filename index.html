<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFU 5th Convocation - Interactive Map</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        h2{
            color: green;
        }

        /* Two-column layout container */
        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* Map Column (Flexible Left) */
        .map-container {
            position: relative;
            flex: 3; /* Takes up 3 parts of space */
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        #mapCanvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* Sidebar Directory Column (Fixed Right) */
        .sidebar-directory {
            flex: 1; /* Takes up 1 part of space */
            min-width: 300px;
            max-height: 75vh;
            overflow-y: auto; /* Scrollable if 20+ items exceed height */
            padding-right: 5px;
        }

        .sidebar-directory h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            position: sticky;
            top: 0;
            background: #fff;
        }

        /* Individual Legend Item Styling */
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .legend-item:hover {
            background: #eef2f7;
            transform: translateX(3px);
        }

        /* Active/Highlighted state from Map Click */
        .legend-item.active {
            background: #e8f4fd;
            border-left-color: #3498db;
        }

        /* Number Badge Matching Map Pin */
        .badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .location-name {
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }

        /* Responsive stack for tablets/phones */
        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
            }
            .sidebar-directory {
                max-height: 300px;
            }
        }

        /* Popup Modal Styles */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }

        .modal-close:hover { color: #333; }
        #modalImage { width: 100%; height: auto; border-radius: 6px; margin-top: 10px; background-color: #eee; }
        #modalTitle { margin: 10px 0 5px 0; color: #222; }
        #modalDesc { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Info Popup Modal -->

            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Landmark</h2>

            <img id="modalImage" src="" alt="Snapshot View">

    </div>

        const img = new Image();

            { id: 24, name: "Bsc. AG Certificate Distribution-4", x: 30, y: 55, color: "#e74c3c", desc: "Collect your Certificate from here", photo: "https://via.placeholder.com/500x300?text=Main+Entrance+Snapshot" },
            { id: 25, name: "Bsc. Forestry Certificate Distribution", x: 38, y: 53, color: "#2f441f", desc: "Collect your Certificate from here", photo: "https://via.placeholder.com/500x300?text=Main+Entrance+Snapshot" },
            { id: 26, name: "B.V.Sc & HA/Fisheries Certificate Distribution", x: 45, y: 56, color: "#7A232E", desc: "Collect your Certificate from here", photo: "https://via.placeholder.com/500x300?text=Main+Entrance+Snapshot" },
            { id: 27, name: "Selfie Point", x: 36, y: 72, color: "#1194a8", desc: "Make a lifetime memory with our photo stand", photo: "selfie_point.jpg" },
            { id: 28, name: "Selfie Point", x: 37, y: 74, color: "#1194a8", desc: "Make a lifetime memory with our photo stand", photo: "selfie_point.jpg" },
            { id: 29, name: "Selfie Point", x: 40, y: 75, color: "#1194a8", desc: "Make a lifetime memory with our photo stand", photo: "selfie_point.jpg" },
            { id: 30, name: "Selfie Point", x: 42, y: 73, color: "#1194a8", desc: "Make a lifetime memory with our photo stand", photo: "selfie_point.jpg" },
            { id: 31, name: "Masters Certification Distribution", x: 53, y: 62, color: "#1194a8", desc: "Collect your Certificate here", photo: "/.jpg" },
            { id: 32, name: "Masters Certification Distribution", x: 56, y: 68, color: "#1194a8", desc: "Collect your Certificate here", photo: "/.jpg" },

            // Add items 7 to 25 right here following this exact structure!
        ];

        const pinRadius = 13; // Sightly larger radius to accommodate the dynamic numbers inside the pin

        img.onload = function() {
            resizeCanvas();
            generateSidebar();
            window.addEventListener('resize', resizeCanvas);
        };

        function resizeCanvas() {
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            drawMap();
        }

        // Draw background layout and overlay numbered pins
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);

            landmarks.forEach((point, index) => {
                const actualX = (point.x / 100) * canvas.width;
                const actualY = (point.y / 100) * canvas.height;

                // Translucent glow
                ctx.beginPath();
                ctx.arc(actualX, actualY, pinRadius + 6, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.fill();

                // Solid pin center
                ctx.beginPath();
                ctx.arc(actualX, actualY, pinRadius, 0, 2 * Math.PI);
                ctx.fillStyle = point.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // Draw number text inside the pin centered perfectly
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 13px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(index + 1, actualX, actualY + 1);
            });
        }

        // Automatically construct the sidebar UI based on the landmarks array
        function generateSidebar() {
            const listContainer = document.getElementById('legendList');
            listContainer.innerHTML = '';

            landmarks.forEach((point, index) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.id = `sidebar-item-${index}`;
                item.onclick = () => selectLandmark(point, index);

                item.innerHTML = `
                    <div class="badge" style="background-color: ${point.color}">${index + 1}</div>
                    <div class="location-name">${point.name}</div>
                `;
                listContainer.appendChild(item);
            });
        }

        // Action when a pin or sidebar list item is triggered
        function selectLandmark(landmark, index) {
            // Remove active states from sidebar
            document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
            
            // Highlight current sidebar item and scroll it smoothly into view
            const activeSidebarItem = document.getElementById(`sidebar-item-${index}`);
            if(activeSidebarItem) {
                activeSidebarItem.classList.add('active');
                activeSidebarItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Fire up modal with custom image views
            openModal(landmark);
        }

        // Handle Canvas Clicks
        canvas.addEventListener('click', function(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const clickX = (event.clientX - rect.left) * scaleX;
            const clickY = (event.clientY - rect.top) * scaleY;

            let foundIndex = -1;

            landmarks.forEach((point, index) => {
                const targetX = (point.x / 100) * canvas.width;
                const targetY = (point.y / 100) * canvas.height;
                const distance = Math.sqrt((clickX - targetX) ** 2 + (clickY - targetY) ** 2);
                
                if (distance <= pinRadius + 10) { 
                    foundIndex = index;
                }
            });

            if (foundIndex !== -1) {
                selectLandmark(landmarks[foundIndex], foundIndex);
            }
        });

        function openModal(landmark) {
            document.getElementById('modalTitle').innerText = landmark.name;
            document.getElementById('modalDesc').innerText = landmark.desc;
            document.getElementById('modalImage').src = landmark.photo;
            document.getElementById('infoModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('infoModal').classList.remove('show');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('infoModal');
            if (event.target == modal) closeModal();
        }
